<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Serenity Web Trainer</title>
<style>
  :root { --bg:#101418; --panel:#1a2027; --line:#2a323c; --fg:#d7dee7; --dim:#7d8a99; --acc:#4fa3ff; --ok:#4caf7d; --bad:#e05a5a; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.45 system-ui, sans-serif; }
  header { padding:10px 16px; border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; }
  header h1 { font-size:15px; margin:0; letter-spacing:.06em; color:var(--acc); }
  #gpu { color:var(--dim); font-size:12px; margin-left:auto; }
  main { display:grid; grid-template-columns: 330px 1fr; gap:0; min-height:calc(100vh - 45px); }
  #left { border-right:1px solid var(--line); padding:14px; }
  #right { padding:14px; overflow-x:hidden; }
  label { display:block; color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.05em; margin:10px 0 3px; }
  input, select { width:100%; background:var(--panel); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:7px 9px; font:inherit; }
  button { border:0; border-radius:6px; padding:9px 16px; font:inherit; font-weight:600; cursor:pointer; }
  #start { background:var(--ok); color:#08130d; width:100%; margin-top:14px; }
  #stopb { background:var(--bad); color:#fff; width:100%; margin-top:8px; display:none; }
  .rail { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:8px; margin-bottom:12px; }
  .stat { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
  .stat b { display:block; font-size:11px; color:var(--dim); font-weight:600; text-transform:uppercase; }
  .stat span { font-size:16px; }
  #bar { height:6px; background:var(--panel); border-radius:3px; overflow:hidden; margin-bottom:12px; }
  #barfill { height:100%; width:0%; background:var(--acc); transition:width .3s; }
  #log { background:#0b0e12; border:1px solid var(--line); border-radius:8px; padding:10px; height:220px; overflow-y:auto; font:12px/1.5 ui-monospace, monospace; white-space:pre-wrap; word-break:break-all; }
  #gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-top:14px; }
  #gallery img { width:100%; border-radius:8px; border:1px solid var(--line); cursor:pointer; }
  .unwired { color:var(--dim); }
  h2 { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); margin:16px 0 8px; }
  #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:9; align-items:center; justify-content:center; }
  #lightbox img { max-width:92vw; max-height:92vh; border-radius:8px; }
</style>
</head>
<body>
<header><h1>SERENITY WEB TRAINER</h1><span id="runstate" class="unwired">idle</span><span id="gpu"></span></header>
<main>
  <div id="left">
    <label>Model</label><select id="preset"></select>
    <label>Run name</label><input id="run_name">
    <label>Dataset cache</label><input id="cache">
    <label>Learning rate</label><input id="learning_rate" type="number" step="0.00001">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><label>Rank</label><input id="lora_rank" type="number"></div>
      <div><label>Alpha</label><input id="lora_alpha" type="number"></div>
      <div><label>Steps</label><input id="max_steps" type="number"></div>
      <div><label>Save every</label><input id="save_every" type="number"></div>
      <div><label>Sample every</label><input id="sample_every" type="number"></div>
      <div><label>Seed</label><input id="seed" type="number" placeholder="preset"></div>
    </div>
    <label>Resume .state (optional — full resume)</label><input id="resume_state" placeholder="/path/to/ckpt.safetensors.state">
    <label>Start step (with resume)</label><input id="start_step" type="number" placeholder="0">
    <button id="start">START TRAINING</button>
    <button id="stopb">STOP</button>
    <div id="msg" style="margin-top:10px;font-size:12px;color:var(--dim)"></div>
  </div>
  <div id="right">
    <div id="bar"><div id="barfill"></div></div>
    <div class="rail">
      <div class="stat"><b>Step</b><span id="s_step">–</span></div>
      <div class="stat"><b>Epoch</b><span id="s_epoch">–</span></div>
      <div class="stat"><b>Loss</b><span id="s_loss">–</span></div>
      <div class="stat"><b>Grad</b><span id="s_grad">–</span></div>
      <div class="stat"><b>Speed</b><span id="s_speed">–</span></div>
      <div class="stat"><b>ETA</b><span id="s_eta">–</span></div>
    </div>
    <h2>Live log</h2><div id="log"></div>
    <h2>Samples</h2><div id="gallery"></div>
  </div>
</main>
<div id="lightbox" onclick="this.style.display='none'"><img id="lbimg"></div>
<script>
let PRESETS = [], RUN = null;
const $ = id => document.getElementById(id);
const fields = ["learning_rate","lora_rank","lora_alpha","max_steps","save_every","sample_every"];

async function loadPresets() {
  const r = await fetch("/api/presets"); const j = await r.json();
  PRESETS = j.presets;
  $("preset").innerHTML = PRESETS.map(p =>
    `<option value="${p.id}" ${p.wired?"":"disabled"}>${p.label}${p.wired?"":" (not wired)"}</option>`).join("");
  applyPreset();
}
function applyPreset() {
  const p = PRESETS.find(x => x.id === $("preset").value); if (!p) return;
  $("run_name").value = p.run_name; $("cache").value = p.cache;
  for (const f of fields) if (p.recipe[f] !== undefined) $(f).value = p.recipe[f];
}
$("preset").onchange = applyPreset;

$("start").onclick = async () => {
  const overrides = {};
  for (const f of fields) { const v = $(f).value; if (v !== "") overrides[f] = parseFloat(v); }
  if ($("seed").value !== "") overrides.seed = parseInt($("seed").value);
  const body = { preset_id: $("preset").value, overrides,
                 cache: $("cache").value || null, run_name: $("run_name").value || null };
  if ($("resume_state").value) { body.resume_state = $("resume_state").value;
                                 body.start_step = parseInt($("start_step").value || "0"); }
  const r = await fetch("/api/runs", {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(body)});
  const j = await r.json();
  if (!r.ok) { $("msg").textContent = "✗ " + j.error; return; }
  RUN = j.run_id; $("msg").textContent = "▶ " + j.tail;
  $("runstate").textContent = "RUNNING"; $("runstate").style.color = "var(--ok)";
  $("stopb").style.display = "block"; $("log").textContent = "";
};
$("stopb").onclick = async () => { if (RUN != null) await fetch(`/api/runs/${RUN}/stop`, {method:"POST"}); };

function logline(t) {
  const el = $("log"); el.textContent += t + "\n";
  if (el.textContent.length > 60000) el.textContent = el.textContent.slice(-40000);
  el.scrollTop = el.scrollHeight;
}
async function refreshGallery() {
  if (RUN == null) return;
  const r = await fetch(`/api/runs/${RUN}/samples`); const j = await r.json();
  if (!j.samples) return;
  $("gallery").innerHTML = j.samples.map(s =>
    `<img src="${s}" loading="lazy" onclick="$('lbimg').src='${s}';$('lightbox').style.display='flex'">`).join("");
}
function connectSSE() {
  const es = new EventSource("/api/events");
  es.onmessage = e => {
    const m = JSON.parse(e.data);
    if (m.type === "progress" && m.run.id === RUN) {
      const r = m.run;
      $("s_step").textContent = `${r.step}/${r.total_steps}`;
      $("s_epoch").textContent = `${r.epoch}/${r.total_epochs}`;
      $("s_loss").textContent = r.loss.toFixed(4);
      $("s_grad").textContent = r.grad_norm.toFixed(4);
      $("s_speed").textContent = r.s_per_step.toFixed(1) + "s";
      $("s_eta").textContent = r.eta || "–";
      $("barfill").style.width = (100 * r.step / Math.max(1, r.total_steps)) + "%";
    } else if (m.type === "log" && m.run_id === RUN) {
      logline(m.line);
      if (m.line.includes("sample") && m.line.includes(".png")) refreshGallery();
    } else if (m.type === "status" && m.run.id === RUN) {
      $("runstate").textContent = m.run.status.toUpperCase();
      $("runstate").style.color = m.run.status === "failed" ? "var(--bad)" : "var(--dim)";
      $("stopb").style.display = "none";
      refreshGallery();
    }
  };
  es.onerror = () => setTimeout(connectSSE, 3000);
}
async function pollGpu() {
  const r = await fetch("/api/runs"); const j = await r.json();
  $("gpu").textContent = j.gpu_busy ? ("GPU: " + j.gpu_busy) : "GPU: free";
}
loadPresets(); connectSSE(); pollGpu(); setInterval(pollGpu, 10000); setInterval(refreshGallery, 30000);
</script>
</body>
</html>
