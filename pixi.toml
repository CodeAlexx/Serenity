[workspace]
authors = ["CodeAlexx <codealex@example.com>"]
channels = ["https://conda.modular.com/max", "conda-forge"]
name = "serenity-trainer"
platforms = ["linux-64"]
version = "0.0.1"

# Pure-Mojo port of Serenity's training core (no Python runtime).
# Reuses ONLY the numerical foundation from mojodiffusion's serenitymojo:
#   serenitymojo/{autograd.mojo, tensor.mojo, ops/}
# via the cross-repo include path  -I /home/alex/mojodiffusion  (no vendoring).
# Dtype policy: BF16 in/out, F32 compute (flame-core convention).

[tasks]
build-mojoui = "make -C /home/alex/MojoUI/c_floor"
ideogram4-live-trainer-build = "mkdir -p target && mojo build -I . -I src -I /home/alex/mojodiffusion -Xlinker -lm src/serenity_trainer/trainer/Ideogram4LiveTrainer.mojo -o target/serenity_ideogram4_live_trainer"
# Klein 9B (UI wave 2, 2026-06-12): the UI klein runner is now the config-
# driven serenitymojo train_klein_real (argv: <train_config.json> <steps>) —
# it consumes the T1 levers (loss/optimizer/EMA/caption-dropout) the UI
# emits; the old positional KleinLiveTrainer port carried no levers.
# RUNPATH -L set mirrors the zimage runner (sqlite3 for SerenityBoard,
# cshim for cuDNN SDPA, pip cudnn libs).
# Pulled into serenity-trainer (2026-06-23): the klein trainer DRIVER now lives
# here (src/serenity_trainer/trainer/train_klein_real.mojo) and uses serenitymojo
# ONLY as the shared numeric/model lib via -I /home/alex/mojodiffusion. Full link
# recipe mirrors zimage (flash-SDPA shim + cuda mempool rpaths) PLUS -lsqlite3
# (SerenityBoard) — harmless if a given driver doesn't pull every symbol.
# Klein also needs -I /home/alex/MOJO-libs: its sampler include (klein_sampler ->
# proc_ipc/ipc_codec) imports the local 'net' and 'json' modules that live there,
# matching mojodiffusion's own klein build tasks.
klein-live-trainer-build = "mkdir -p target && mojo build -I . -I src -I /home/alex/mojodiffusion -I /home/alex/MOJO-libs -Xlinker -lm -Xlinker -lcuda -Xlinker -L/home/alex/mojodiffusion/.pixi/envs/default/lib -Xlinker -lsqlite3 -Xlinker -L/home/alex/mojodiffusion/serenitymojo/ops/cshim/lib -Xlinker -lserenity_cudnn_sdpa -Xlinker -rpath -Xlinker /home/alex/mojodiffusion/serenitymojo/ops/cshim/lib -Xlinker -rpath -Xlinker /home/alex/.local/lib/python3.12/site-packages/nvidia/cudnn/lib -Xlinker -rpath -Xlinker /home/alex/mojodiffusion/.pixi/envs/default/lib src/serenity_trainer/trainer/train_klein_real.mojo -o target/serenity_klein_live_trainer"
# Config-driven runners reused from the campaign-verified serenitymojo trainers
